<!DOCTYPE html>
<html>

<head>

<title>Local AI</title>

<!-- =========================
LIBRARIES
========================= -->

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">

<!-- =========================
CSS SECTION
========================= -->

<style>

*{box-sizing:border-box}

/* PAGE */

body{
margin:0;
font-family:system-ui;
background:#202123;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

#sidebar{
width:260px;
background:#171717;
padding:15px;
overflow:auto;
border-right:1px solid #2a2a2a;
}

/* MODEL SELECTOR */

#modelSelect{
background:#2b2d31;
color:white;
border:none;
padding:8px;
border-radius:6px;
margin-bottom:10px;
width:100%;
}

/* NEW CHAT */

#newChat{
background:#2b2d31;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
margin-bottom:15px;
}

/* CHAT ROW */

.chatRow{
display:flex;
align-items:center;
justify-content:space-between;
padding:8px;
border-radius:6px;
margin-bottom:4px;
cursor:pointer;
}

.chatRow:hover{
background:#2a2b32;
}

.activeChat{
background:#2a2b32;
}

.chatTitle{
flex:1;
font-size:14px;
}

/* SIDEBAR BUTTONS */

.iconBtn{
background:none;
border:none;
color:#aaa;
cursor:pointer;
font-size:12px;
margin-left:6px;
}

.iconBtn:hover{
color:white;
}

/* MAIN AREA */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* CHAT AREA */

#chat{
flex:1;
overflow:auto;
padding:30px;
scroll-behavior:smooth;
}

/* MESSAGE ROW */

.message{
display:flex;
margin-bottom:20px;
padding-left:20px;
padding-right:20px;
animation:fadeIn .15s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(6px);
}
to{
opacity:1;
transform:translateY(0);
}
}
/* USER MESSAGE (RIGHT SIDE) */

.user{
background:#444654;
padding:12px;
border-radius:12px;
max-width:70%;
margin-left:auto;
word-wrap:break-word;
overflow-wrap:anywhere;
line-height:1.5;
}

/* AI MESSAGE (LEFT SIDE) */

.ai{
background:#111111;
padding:12px;
border-radius:12px;
max-width:70%;
margin-right:auto;
word-wrap:break-word;
overflow-wrap:anywhere;
line-height:1.5;
}
/* HOVER ACTIONS */

.messageActions{
opacity:0;
margin-top:5px;
transition:opacity .15s;
}

.message:hover .messageActions{
opacity:1;
}

/* COPY BUTTON */

.copyBtn{
font-size:12px;
padding:4px 8px;
background:#3a3a3a;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

/* INPUT AREA */

#inputArea{
padding:18px;
border-top:1px solid #2a2a2a;
}

/* TEXTAREA */

textarea{
width:100%;
background:#2b2d31;
border:none;
color:white;
padding:12px;
border-radius:10px;
resize:none;
font-size:14px;
}

textarea:focus{
outline:none;
}

/* STOP BUTTON */

#stopBtn{
background:#aa3333;
border:none;
color:white;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
display:none;
}

/* CODE BLOCK */

pre{
background:#111;
padding:14px;
border-radius:10px;
overflow:auto;
font-size:13px;
}

code{
font-family:monospace;
}

</style>

</head>

<body>

<!-- =========================
HTML STRUCTURE
========================= -->

<div id="sidebar">

<select id="modelSelect">
<option value="gpt-4.1-mini">GPT-4.1 Mini</option>
<option value="gpt-4.1">GPT-4.1</option>
<option value="gpt-4o-mini">GPT-4o Mini</option>
</select>

<div id="newChat">+ New Chat</div>

<div id="history"></div>

</div>


<div id="main">

<div id="chat"></div>

<div id="inputArea">

<div style="display:flex;gap:10px">

<textarea id="message" rows="2"
placeholder="Send a message..."></textarea>

<button id="stopBtn">Stop</button>

</div>

</div>

</div>

<!-- =========================
JAVASCRIPT SECTION
========================= -->

<script>

/* GLOBAL VARIABLES */

let chats=[]
let currentIndex=0

let streamInterval=null
let stopGeneration=false

const chatBox=document.getElementById("chat")

/* LOAD CHATS */

async function init(){

let res=await fetch("/load_chats")

chats=await res.json()

if(chats.length===0){
newChat()
}

renderHistory()
loadChat(chats.length-1)

}

/* LOAD SELECTED CHAT */

function loadChat(i){

currentIndex=i

chatBox.innerHTML=""

let messages=chats[currentIndex].messages

messages.forEach(addMessage)

scrollBottom()

}

/* ADD MESSAGE UI */

function addMessage(m){

let div=document.createElement("div")
div.className="message"

let bubble=document.createElement("div")

if(m.role==="user"){
bubble.className="user"
}else{
bubble.className="ai"
}

bubble.innerHTML=marked.parse(m.content)

div.appendChild(bubble)

/* ACTION BUTTONS */

if(m.role==="assistant"){

let actions=document.createElement("div")
actions.className="messageActions"

let copy=document.createElement("button")
copy.className="copyBtn"
copy.innerText="Copy"

copy.onclick=()=>{
navigator.clipboard.writeText(m.content)
copy.innerText="Copied"
setTimeout(()=>copy.innerText="Copy",1000)
}

actions.appendChild(copy)

div.appendChild(actions)

}

chatBox.appendChild(div)

highlightCode(div)

}

/* CODE HIGHLIGHT */

function highlightCode(el){

el.querySelectorAll("pre code").forEach((block)=>{
hljs.highlightElement(block)
})

}

function scrollBottom(){
chatBox.scrollTop=chatBox.scrollHeight
}

/* RENDER SIDEBAR */

function renderHistory(){

let history=document.getElementById("history")

history.innerHTML=""

chats.forEach((chat,i)=>{

let row=document.createElement("div")

row.className="chatRow"

if(i===currentIndex){
row.classList.add("activeChat")
}

let title=document.createElement("div")
title.className="chatTitle"
title.innerText=chat.title

title.onclick=()=>loadChat(i)

/* RENAME */

let rename=document.createElement("button")
rename.className="iconBtn"
rename.innerText="✏"

rename.onclick=(e)=>{

e.stopPropagation()

let name=prompt("Rename chat",chat.title)

if(name){
chat.title=name
saveChats()
renderHistory()
}

}

/* DELETE */

let del=document.createElement("button")
del.className="iconBtn"
del.innerText="🗑"

del.onclick=(e)=>{

e.stopPropagation()

if(confirm("Delete chat?")){

chats.splice(i,1)

if(chats.length===0){
newChat()
}else{
loadChat(0)
}

saveChats()
renderHistory()

}

}

row.appendChild(title)
row.appendChild(rename)
row.appendChild(del)

history.appendChild(row)

})

}

/* NEW CHAT */

function newChat(){

let chat={
title:"New Chat",
messages:[]
}

chats.push(chat)

currentIndex=chats.length-1

renderHistory()

chatBox.innerHTML=""

saveChats()

}

document.getElementById("newChat").onclick=newChat

/* SAVE CHAT */

async function saveChats(){

await fetch("/save_chats",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify(chats)

})

}

/* SEND MESSAGE */

async function sendMessage(text){

let messages=chats[currentIndex].messages

let userMsg={role:"user",content:text}

messages.push(userMsg)

addMessage(userMsg)

scrollBottom()

let model=document.getElementById("modelSelect").value

let res=await fetch("/chat",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({
messages:messages,
model:model
})

})

let data=await res.json()

let aiMsg={role:"assistant",content:""}

messages.push(aiMsg)

addMessage(aiMsg)

/* STREAMING EFFECT */

stopGeneration=false

document.getElementById("stopBtn").style.display="block"

let words=data.reply.split(" ")

let i=0

streamInterval=setInterval(()=>{

if(stopGeneration || i>=words.length){

clearInterval(streamInterval)

document.getElementById("stopBtn").style.display="none"

return

}

aiMsg.content+=words[i]+" "

chatBox.lastChild.querySelector(".ai").innerHTML=
marked.parse(aiMsg.content)

highlightCode(chatBox.lastChild)

scrollBottom()

i++

},15)

if(messages.length===2){
chats[currentIndex].title=text.slice(0,40)
renderHistory()
}

saveChats()

}

/* STOP BUTTON */

document.getElementById("stopBtn").onclick=function(){

stopGeneration=true

}

/* ENTER TO SEND */

let textarea=document.getElementById("message")

textarea.addEventListener("keydown",function(e){

if(e.key==="Enter" && !e.shiftKey){

e.preventDefault()

let text=textarea.value.trim()

if(!text) return

textarea.value=""

sendMessage(text)

}

})

init()

</script>

</body>

</html>
